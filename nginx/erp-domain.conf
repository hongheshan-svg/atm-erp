# Host nginx config for szautomate.com/erp
# Deploy:
#   sudo cp /home/administrator/erp/nginx/erp-domain.conf /etc/nginx/sites-available/erp
#   sudo ln -sf /etc/nginx/sites-available/erp /etc/nginx/sites-enabled/erp
#   sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    server_name szautomate.com www.szautomate.com 192.168.2.3;

    # Redirect root to /erp/
    location = / {
        return 301 /erp/;
    }

    # Redirect bare /erp to /erp/
    location = /erp {
        return 301 /erp/;
    }

    # Frontend Vue SPA at /erp/
    location /erp/ {
        proxy_pass http://127.0.0.1:8080/erp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8080/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static & Media files
    location /static/ {
        proxy_pass http://127.0.0.1:8080/static/;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:8080/media/;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://127.0.0.1:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
