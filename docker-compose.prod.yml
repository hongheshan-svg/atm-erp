version: '3.8'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: erp_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-erp_db}
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:7.17.17
    container_name: erp_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - erp_network

  # Django Backend (Gunicorn)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: erp_backend
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --worker-class gthread"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    env_file:
      - ./backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - erp_network

  # Django Backend (Daphne for WebSocket)
  backend-ws:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: erp_backend_ws
    restart: always
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - ./logs:/app/logs
    env_file:
      - ./backend/.env.prod
    depends_on:
      - backend
    networks:
      - erp_network

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: erp_celery
    restart: always
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ./logs:/app/logs
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
      - backend
    networks:
      - erp_network

  # Celery Beat
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: erp_celery_beat
    restart: always
    command: celery -A config beat -l info
    volumes:
      - ./logs:/app/logs
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
      - redis
      - backend
    networks:
      - erp_network

  # Frontend (Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: erp_frontend
    restart: always
    volumes:
      - frontend_dist:/app/dist
    networks:
      - erp_network

  # Nginx with SSL
  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    restart: always
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/nginx/html
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - backend-ws
      - frontend
    networks:
      - erp_network

  # Certbot for SSL renewal (optional)
  certbot:
    image: certbot/certbot
    container_name: erp_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - erp_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  static_volume:
  media_volume:
  frontend_dist:

networks:
  erp_network:
    driver: bridge
