[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["migrations", "*/migrations/*", "venv", ".venv"]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes — undefined names, unused imports
  "W",    # pycodestyle warnings
  "I",    # isort
  "B",    # bugbear
  "DJ",   # django-specific
]
ignore = [
  "E501",  # line too long — ruff format handles most cases
  "B008",  # function call in default argument — DRF/Django use this idiom
  "E402",  # module-import-not-at-top — Django apps need django.setup() first
  "E701",  # multiple-statements-on-one-line-colon
  "E702",  # multiple-statements-on-one-line-semicolon
  "E722",  # bare-except — legacy code, tracked separately
  "E741",  # ambiguous-variable-name
  "W293",  # blank-line-with-whitespace — ruff format handles this
  "W291",  # trailing-whitespace — ruff format handles this
  "B007",  # unused-loop-control-variable
  "B023",  # function-uses-loop-variable
  "B904",  # raise-without-from-inside-except
  "DJ001", # django-nullable-model-string-field
  "DJ008", # django-model-without-dunder-str
  "DJ012", # django-unordered-body-content-in-model
  "F841",  # unused-variable — many intentional assignments for readability
]

[tool.ruff.lint.per-file-ignores]
"config/settings.py" = ["F405", "F403"]
"*/migrations/*" = ["E501", "F401"]
"apps/core/export_service.py" = ["F401"]

[tool.ruff.format]
quote-style = "single"
