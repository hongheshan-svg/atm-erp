name: CI

# Regression gate the audit flagged as missing: run lint + backend tests + frontend
# checks on every push/PR so fixes can't silently regress (previously CI only built images).

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: erp_db
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: erp_password
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U erp_user" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-only-secret-not-for-prod
      DEBUG: 'False'
      DB_NAME: erp_db
      DB_USER: erp_user
      DB_PASSWORD: erp_password
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      ELASTICSEARCH_ENABLED: 'False'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: python manage.py test --verbosity=2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
