# 从源码本地构建镜像的 override
# 用法: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
  celery:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
  celery-beat:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
  nginx:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
